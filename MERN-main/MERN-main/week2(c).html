<!DOCTYPE html>
<html>
<head>
<title>CSS Colors</title>

<style>
.name { color: yellow; }
.hex { color: #0000ff; }
.rgb { color: rgb(0,128,0); }
.rgba { color: rgba(255,0,0,0.5); }
.hsl { color: hsl(200, 100%, 50%); }
.hsla { color: hsla(300, 100%, 40%, 0.7); }
</style>

</head>
<body>

<h1 class="name">Color Name</h1>
<h1 class="hex">HEX Color</h1>
<h1 class="rgb">RGB Color</h1>
<h1 class="rgba">RGBA Color</h1>
<h1 class="hsl">HSL Color</h1>
<h1 class="hsla">HSLA Color</h1>

</body>
</html>
