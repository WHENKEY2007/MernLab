<!DOCTYPE html>
<html>
<head>
<title>Profile Images</title>

<style>
.container{
display:flex;
gap:30px;
padding:20px;
}

.profile{
text-align:center;
}

img{
width:150px;
height:150px;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 10px gray;
}
</style>

</head>

<body>

<h1>Profile Links</h1>

<div class="container">

<!-- Your Image -->
<div class="profile">
<a href="https://example.com/your-profile" target="_blank">
<img src="male.png" alt="Your Image">
</a>
<p>Your Profile</p>
</div>

<!-- Friend Image -->
<div class="profile">
<a href="https://example.com/friend-profile" target="_blank">
<img src="female.jpg" alt="Friend Image">
</a>
<p>Friend Profile</p>
</div>

</div>

</body>
</html>
