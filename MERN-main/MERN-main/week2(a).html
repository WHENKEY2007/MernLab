<!DOCTYPE html>
<html>
<head>
<title>HTML5 Semantic Tags</title>

<style>
body { font-family: Arial; margin:0; }
header, footer { background:#333; color:white; padding:15px; text-align:center; }
nav { background:#555; padding:10px; }
nav a { color:white; margin:10px; text-decoration:none; }
main { display:flex; padding:20px; }
section { flex:2; }
aside { flex:1; background:#f4f4f4; padding:10px; }
.highlight { color:green; font-weight:bold; }
</style>

</head>
<body>

<header>
<h1>Aditya University</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Courses</a>
<a href="#">Contact</a>
</nav>

<main>

<section>
<article>
<h2>About University</h2>

<p>
<span class="highlight">Aditya University</span> provides quality education.
</p>

<figure>
<img src="logo.png" width="200">
<figcaption>University Logo</figcaption>
</figure>

</article>
</section>

<aside>
<h3>Quick Links</h3>
<ul>
<li>Admissions</li>
<li>Placements</li>
</ul>
</aside>

</main>

<div>
<p>This is a <span class="highlight">div</span> container example.</p>
</div>

<footer>
<p>© 2025 Aditya University</p>
</footer>

</body>
</html>
